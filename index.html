<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Editor Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="logo">✨ Web Editor Pro</div>
        <div class="toolbar">
            <button id="btn-new" class="btn">New </button>
            <label for="file-import" class="btn">Import Files</label>
            <input type="file" id="file-import" multiple accept=".html,.css,.js" style="display: none;">
            <button id="btn-export" class="btn">Export Single HTML</button>
            <button id="btn-export-zip" class="btn btn-primary" style="background:#238636; border-color:#238636;">Export ZIP</button>
            <button id="btn-inspect" class="btn">Inspect Element</button>
            <button id="btn-run" class="btn btn-primary">Run</button>
        </div>
    </header>
    <main class="workspace">
        <div class="editor-pane">
            <div class="tabs">
                <button class="tab active" data-target="html-editor">HTML</button>
                <button class="tab" data-target="css-editor">CSS</button>
                <button class="tab" data-target="js-editor">JavaScript</button>
            </div>
            <textarea id="html-editor" class="code-area" spellcheck="false">&lt;div class="container"&gt;
  &lt;h1&gt;Welcome to Web Editor Pro&lt;/h1&gt;
  &lt;p&gt;Edit the code to see changes immediately.&lt;/p&gt;
  &lt;button onclick="sayHello()"&gt;Click Me&lt;/button&gt;
&lt;/div&gt;</textarea>
            <textarea id="css-editor" class="code-area" spellcheck="false" style="display: none;">body { 
    font-family: 'Inter', sans-serif; 
    text-align: center; 
    margin-top: 50px; 
    background: #0d1117;
    color: #e6edf3;
}
h1 { color: #58a6ff; font-size: 3rem; margin-bottom: 10px; }
p { color: #8b949e; font-size: 1.2rem; }
button { padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 20px; transition: 0.2s; }
button:hover { background: #2ea043; }
.container { padding: 40px; border: 1px solid #30363d; border-radius: 10px; background: #161b22; display: inline-block; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
</textarea>
            <textarea id="js-editor" class="code-area" spellcheck="false" style="display: none;">console.log("Welcome to the integrated console!");
function sayHello() {
    console.info("Button clicked! Greetings from the iframe.");
    alert("Hello World! Editor is working properly.");
}</textarea>
        </div>
        <div class="preview-pane">
            <div class="pane-header">
                <span>Live Preview</span>
                <div class="device-controls">
                    <button class="device-btn active" data-device="desktop" title="Desktop View">💻</button>
                    <button class="device-btn" data-device="tablet" title="Tablet View">💊</button>
                    <button class="device-btn" data-device="mobile" title="Mobile View">📱</button>
                </div>
            </div>
            <div class="iframe-container" id="iframe-container">
                <iframe id="preview-frame"></iframe>
            </div>
            <div class="console-pane">
                <div class="pane-header console-header">
                    <span>Console window</span>
                    <button id="btn-clear-console" class="btn-clear">Clear</button>
                </div>
                <div id="console-output" class="console-output"></div>
                <div class="console-input-wrapper">
                    <span class="console-prompt">&gt;</span>
                    <input type="text" id="console-input" class="console-input" placeholder="Type JavaScript and press Enter..." spellcheck="false" autocomplete="off">
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
